<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Capybara Search</title>
  <link rel="stylesheet" href="chrome://branding/content/fapybara-search.css">
  <link rel="icon" type="image/png" href="chrome://branding/content/icon32.png">
</head>
<body>
  <div class="search-container">
    <div class="logo-wrapper">
      <img src="chrome://branding/content/about-logo.png" class="logo" alt="Fapybara">
      <h1 class="title">Fapybara Search</h1>
    </div>
    <form action="https://www.google.com/search" method="get" class="search-form">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" name="q" class="search-input" placeholder="Search the web with Google..." autofocus required autocomplete="off">
      </div>
      <button type="submit" class="search-btn">Search</button>
    </form>
  </div>
</body>
</html>
